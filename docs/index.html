<!DOCTYPE html>
<!-- data-theme = สวิตช์ธีม · เพิ่มโหมดสว่างทีหลังได้โดยเขียนชุดตัวแปรใต้ [data-theme="light"] -->
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0e12">
<title>TE Sales Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ─── หน้าเข้าสู่ระบบ · แสดงเมื่อยังไม่ล็อกอิน ─── -->
<div id="login" class="login" hidden>
  <form class="login-box" id="loginForm" autocomplete="on">
    <div class="brand-mark login-mark">TE</div>
    <h1>TE Sales Dashboard</h1>
    <p class="login-sub">ระบบติดตามงานขาย Thammasorn Engineering</p>

    <label class="fld">
      <span>อีเมล</span>
      <input type="email" id="loginEmail" required autocomplete="username"
             inputmode="email" autocapitalize="off" spellcheck="false" placeholder="you@dos.co.th">
    </label>

    <label class="fld">
      <span>รหัสผ่าน</span>
      <input type="password" id="loginPass" required autocomplete="current-password" placeholder="••••••••">
    </label>

    <p class="login-err" id="loginErr" role="alert" hidden></p>

    <button class="btn btn-primary" type="submit" id="loginBtn">เข้าสู่ระบบ</button>

    <p class="login-note">
      ระบบนี้ปิดรับสมัครสาธารณะ — ใช้บัญชีที่ผู้ดูแลเชิญเท่านั้น
    </p>
  </form>
</div>

<div id="app" class="app" hidden>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">TE</div>
      <div class="brand-text">
        <strong>Sales Dashboard</strong>
        <span id="brandSub">Thammasorn Engineering</span>
      </div>
    </div>

    <nav class="nav" id="nav">
      <!-- ป้ายชื่อต้องอยู่ใน .lbl เสมอ — ตอนจอ ≤1024px CSS จะซ่อน .lbl ให้เหลือแต่ไอคอน
           ถ้าปล่อยเป็น text เปล่า ๆ จะซ่อนไม่ได้ แล้วตัวหนังสือจะตกบรรทัดในแถบกว้าง 68px -->
      <button class="nav-item is-active" data-view="dashboard" title="ภาพรวม"><span class="ico">◎</span><span class="lbl">ภาพรวม</span></button>
      <button class="nav-item" data-view="pending" title="Pending Project"><span class="ico">▤</span><span class="lbl">Pending Project</span></button>
      <button class="nav-item" data-view="book3" title="Book 3 สี"><span class="ico">◍</span><span class="lbl">Book 3 สี</span></button>
      <button class="nav-item" data-view="activities" title="แผนติดต่อลูกค้า"><span class="ico">✓</span><span class="lbl">แผนติดต่อลูกค้า</span></button>
      <button class="nav-item" data-view="sources" title="แหล่งงาน"><span class="ico">⌘</span><span class="lbl">แหล่งงาน</span></button>
      <button class="nav-item" data-view="suppliers" title="Supplier"><span class="ico">⚒</span><span class="lbl">Supplier</span></button>
    </nav>

    <div class="sidebar-foot">
      <div class="who" id="who">
        <div class="who-avatar" id="whoAvatar">—</div>
        <div class="who-text">
          <strong id="whoName">—</strong>
          <span id="whoMeta">—</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">ออกจากระบบ</button>
      <div class="mode-chip" id="modeChip">mode: —</div>
      <div class="ver" id="verTag">—</div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 id="viewTitle">ภาพรวม</h1>
        <p id="viewSub" class="sub">สรุปสถานะงานขายทั้งหมด</p>
      </div>
      <div class="topbar-right">
        <span class="pill" id="statusPill">กำลังโหลด…</span>
        <span class="pill" id="verPill" title="เวอร์ชันของโค้ดที่เบราว์เซอร์กำลังใช้">—</span>
        <!-- iPad/มือถือซ่อน sidebar-foot → ต้องมีทางออกจากระบบตรงนี้ด้วย -->
        <button class="btn btn-ghost btn-sm only-compact" id="logoutBtnTop">ออกจากระบบ</button>
      </div>
    </header>

    <section class="content" id="content">
      <div class="skeleton">กำลังเริ่มระบบ…</div>
    </section>
  </main>

  <nav class="bottombar" id="bottombar">
    <button class="bn is-active" data-view="dashboard"><span>◎</span>ภาพรวม</button>
    <button class="bn" data-view="pending"><span>▤</span>Pending</button>
    <button class="bn" data-view="book3"><span>◍</span>Book 3</button>
    <button class="bn" data-view="activities"><span>✓</span>ติดตาม</button>
    <button class="bn" data-view="sources"><span>⌘</span>แหล่งงาน</button>
    <button class="bn" data-view="suppliers"><span>⚒</span>Supplier</button>
  </nav>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>

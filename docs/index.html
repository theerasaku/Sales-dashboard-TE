<!DOCTYPE html>
<!-- data-theme = สวิตช์ธีม · เพิ่มโหมดสว่างทีหลังได้โดยเขียนชุดตัวแปรใต้ [data-theme="light"] -->
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0e12">
<title>TE Sales Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="app" class="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">TE</div>
      <div class="brand-text">
        <strong>Sales Dashboard</strong>
        <span id="brandSub">Thammasorn Engineering</span>
      </div>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-item is-active" data-view="dashboard"><span class="ico">◎</span> ภาพรวม</button>
      <button class="nav-item" data-view="pending"><span class="ico">▤</span> Pending Project</button>
      <button class="nav-item" data-view="book3"><span class="ico">◍</span> Book 3 สี</button>
      <button class="nav-item" data-view="activities"><span class="ico">✓</span> แผนติดต่อลูกค้า</button>
      <button class="nav-item" data-view="sources"><span class="ico">⌘</span> แหล่งงาน</button>
      <button class="nav-item" data-view="suppliers"><span class="ico">⚒</span> Supplier</button>
    </nav>

    <div class="sidebar-foot">
      <div class="mode-chip" id="modeChip">mode: —</div>
      <div class="ver">v0.1 · Phase 0</div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 id="viewTitle">ภาพรวม</h1>
        <p id="viewSub" class="sub">สรุปสถานะงานขายทั้งหมด</p>
      </div>
      <div class="topbar-right">
        <span class="pill" id="statusPill">กำลังโหลด…</span>
      </div>
    </header>

    <section class="content" id="content">
      <div class="skeleton">กำลังเริ่มระบบ…</div>
    </section>
  </main>

  <nav class="bottombar" id="bottombar">
    <button class="bn is-active" data-view="dashboard"><span>◎</span>ภาพรวม</button>
    <button class="bn" data-view="pending"><span>▤</span>Pending</button>
    <button class="bn" data-view="book3"><span>◍</span>Book 3</button>
    <button class="bn" data-view="activities"><span>✓</span>ติดตาม</button>
    <button class="bn" data-view="sources"><span>⌘</span>แหล่งงาน</button>
    <button class="bn" data-view="suppliers"><span>⚒</span>Supplier</button>
  </nav>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
